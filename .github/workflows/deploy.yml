name: Deploy CloudTask

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 16.16.65.106
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cloudtask
            git pull origin main
            npm install
            pm2 restart cloudtask